[project]
site_name = "PSplines Documentation"
site_description = "Penalized B-Spline Smoothing for Python"
site_url = "https://psplines.graysonbellamy.dev/"
repo_url = "https://github.com/graysonbellamy/psplines"
repo_name = "graysonbellamy/psplines"

extra_css = ["stylesheets/extra.css"]
extra_javascript = [
  "javascripts/mathjax.js",
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

nav = [
  { "Home" = "index.md" },
  { "User Guide" = [
    { "Getting Started" = "user-guide/getting-started.md" },
    { "Installation" = "user-guide/installation.md" },
    { "Quick Start" = "user-guide/quick-start.md" },
    { "Core Concepts" = "user-guide/core-concepts.md" },
  ] },
  { "Tutorials" = [
    { "Basic Usage" = "tutorials/basic-usage.md" },
    { "Parameter Selection" = "tutorials/parameter-selection.md" },
    { "Uncertainty Quantification" = "tutorials/uncertainty-methods.md" },
    { "Advanced Features" = "tutorials/advanced-features.md" },
  ] },
  { "Examples" = [
    { "Gallery" = "examples/gallery.md" },
  ] },
  { "API Reference" = [
    { "Core" = "api/core.md" },
    { "Whittaker Smoother" = "api/whittaker.md" },
    { "GLM Families" = "api/glm.md" },
    { "Density Estimation" = "api/density.md" },
    { "Basis Functions" = "api/basis.md" },
    { "Penalty Matrices" = "api/penalty.md" },
    { "Optimization" = "api/optimize.md" },
    { "Utilities" = "api/utils.md" },
  ] },
  { "Theory" = [
    { "Mathematical Background" = "theory/mathematical-background.md" },
  ] },
  { "Contributing" = "contributing.md" },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
# "classic" preserves the traditional Material for MkDocs look of the old site.
variant = "classic"
language = "en"
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "search.highlight",
  "search.share",
  "toc.integrate",
  "content.code.copy",
  "content.code.annotate",
]

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue"
accent = "cyan"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "blue"
accent = "cyan"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Extra (social links)
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/graysonbellamy/psplines"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/psplines"

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"
docstring_section_style = "list"
members_order = "source"
show_source = true
show_bases = true
show_inheritance_diagram = true
merge_init_into_class = true
separate_signature = true
show_signature_annotations = true
signature_crossrefs = true

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
